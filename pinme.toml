# Pinme config file
# Project name (required)
project_name = "my-app"

# CORS config
[cors]
origins = ["*"]

# D1 database config
[d1]
# Database migrations directory
migrations_dir = "db"
# D1 database UUID (auto-filled when creating project)
# database_id = ""

# Environment variables
[vars]
VITE_WORKER_URL = "https://your-worker-{hash}.pinme.pro"

# API Key（用于发送邮件等操作，创建项目时自动填充）
api_key = ""
